spring:
  datasource:
    url: jdbc:h2:mem:djinni_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false

server:
  port: 8080

telegram:
  bot:
    enabled: true
    token: Мій токен
    username: djinni_lab_bot
    poll-delay-ms: 5000